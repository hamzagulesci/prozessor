name: APK Derle

on:
  push:
    branches: [ master ]
  workflow_dispatch:  # Elle de tetiklenebilir

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}

      - name: APK derle
        run: ./gradlew assembleDebug --no-daemon

      - name: APK'yı yükle (indirilabilir artifact)
        uses: actions/upload-artifact@v4
        with:
          name: prozessor-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
